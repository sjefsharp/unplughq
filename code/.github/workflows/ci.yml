name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: code
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        working-directory: code
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: code
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript compiler
        working-directory: code
        run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: code
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        working-directory: code
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: code
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        working-directory: code
        env:
          SKIP_ENV_VALIDATION: "true"
        run: pnpm build

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: code
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        working-directory: code
        run: pnpm audit --prod
