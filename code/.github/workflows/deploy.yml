name: CD — Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - "code/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-production
  cancel-in-progress: false # Never cancel a running deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/unplughq
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

permissions:
  contents: read
  packages: write

jobs:
  # ─── Gate: CI must pass first ─────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: code
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: code
        run: pnpm lint

      - name: Typecheck
        working-directory: code
        run: pnpm typecheck

      - name: Unit tests
        working-directory: code
        run: pnpm test

      - name: Build
        working-directory: code
        env:
          SKIP_ENV_VALIDATION: "true"
        run: pnpm build

  # ─── Build and push Docker images ────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [ci-gate]
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-app
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Next.js app image
        uses: docker/build-push-action@v6
        with:
          context: ./code
          file: ./code/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-app:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKIP_ENV_VALIDATION=true

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./code
          file: ./code/Dockerfile.worker
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKIP_ENV_VALIDATION=true

  # ─── Run database migrations ──────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: code
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        working-directory: code
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

  # ─── Deploy to production server ──────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/unplughq

            # Pull latest images
            docker compose -f docker-compose.production.yml pull app worker

            # Store current image tags for rollback
            docker compose -f docker-compose.production.yml ps --format json > /tmp/pre-deploy-state.json || true

            # Rolling update — app first, then worker
            docker compose -f docker-compose.production.yml up -d --no-deps --wait app
            docker compose -f docker-compose.production.yml up -d --no-deps --wait worker

            # Verify health
            echo "Waiting for health check..."
            sleep 10
            HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/api/health || echo "000")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "❌ Health check failed (HTTP $HTTP_STATUS). Rolling back..."
              docker compose -f docker-compose.production.yml down app worker
              docker compose -f docker-compose.production.yml up -d app worker
              echo "Rollback complete. Deployment failed."
              exit 1
            fi

            echo "✅ Health check passed (HTTP $HTTP_STATUS). Deployment successful."

            # Clean up old images
            docker image prune -f

  # ─── Post-deploy verification ─────────────────────────────
  verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Verify production health
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' "${{ secrets.PRODUCTION_URL }}/api/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Production health check passed on attempt $i"
              exit 0
            fi
            echo "⏳ Attempt $i/$MAX_RETRIES: HTTP $HTTP_STATUS — retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          echo "❌ Production health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Notify deployment success
        if: success()
        run: echo "🚀 UnplugHQ deployed successfully — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
