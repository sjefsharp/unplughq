site_name: 'UnplugHQ'
site_url: https://sjefsharp.github.io/unplughq/
site_description: 'UnplugHQ — project documentation'
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  custom_dir: overrides
extra_css:
  - stylesheets/extra.css
plugins:
  - search
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
nav:
- Home: index.md
- Product Management:
    - Feature Roadmap: feature-roadmap.md
    - Product Vision: product-vision.md
- Business Analysis:
    - Domain Glossary: domain-glossary.md
    - Process Models: process-models.md
    - Requirements: requirements.md
    - Stakeholder Analysis: stakeholder-analysis.md
- Program Management:
    - Initial Risk Register: risk-register.md
    - PI Objectives: pi-objectives.md
- System Architecture:
    - Architecture Overview: architecture-overview.md
    - Solution Assessment: solution-assessment.md
- Project Tracking:
    - Gate Evaluations: gate-evaluations.md
    - Session Checkpoint: session-checkpoint.md
